<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {{BASE_TAG}}
  <title>3DPrintLibrary</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-top">
        <img id="logo" class="logo" src="logo.png" alt="" aria-hidden="true">
        <div class="product-title"><span>3D PRINT</span><span>LIBRARY</span></div>
      </div>
      <div class="header-bottom">
        <nav id="breadcrumb" class="breadcrumb"></nav>
      </div>
    </header>
    
    <main>
      <div id="grid"></div>
      <div id="flyout" class="hidden">
        <div class="flyout-header">
          <span id="flyout-title" class="flyout-title">README</span>
          <button id="flyout-toggle" type="button" aria-label="Collapse README panel" aria-expanded="true">
            <svg viewBox="0 0 18 22" aria-hidden="true" focusable="false"><path d="M4 5.5L9.5 11 4 16.5 M9 5.5l5.5 5.5L9 16.5"/></svg>
          </button>
        </div>
        <div id="readme-content"></div>
      </div>
    </main>

    <div id="modal" class="hidden">
      <div id="modal-overlay"></div>
      <div id="modal-content">
        <button id="modal-close" aria-label="Close">✕</button>
        <div id="modal-body"></div>
        <div id="modal-footer" class="modal-footer"></div>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>window.BASE_URL = '{{BASE_URL}}';</script>
  <script src="js/app.js"></script>
</body>
</html>
