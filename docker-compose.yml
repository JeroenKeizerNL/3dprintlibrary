services:
  3dprintlibrary:
    build:
      context: .
      dockerfile: Dockerfile
    image: 3dprintlibrary:latest
    container_name: 3dprintlibrary
    restart: unless-stopped
    ports:
      - "3123:3123"
    environment:
      PORT: "3123"
      DATA_DIR: /data
      BASE_URL: /myapp
      PUID: "1000"
      PGID: "1000"
      TZ: Europe/Amsterdam
    volumes:
      - ./library:/data:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null "http://127.0.0.1:${PORT:-3123}${BASE_URL:-}/api/health" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
